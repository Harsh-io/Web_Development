<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW</title>
</head>
<body>
    <form>
    <h2>Feedback Form</h2>
    <form action="/action">
        <div>
            <label for="name">Name:</label>
            <input type="text" placeholder="Write your Name" id="name" name="name"><br>
            <label for="email">Email:</label>
            <input type="text" placeholder="Write your email"id="email" name="email">
        </div>
        <div>
            <label for="message">Message:</label><br/>
            <textarea name="message" id="message" rows="5" cols="20"></textarea>
        </div>
        <div>
            <label for="">Rate us out of 5:</label><br>
            <input type="radio" name="rate" id="one" value="one"/>
            <label for="one">1</label><br>
            <input type="radio" name="rate" id="two" value="two"/>
            <label for="two">2</label><br>
            <input type="radio" name="rate" id="three" value="three"/>
            <label for="three">3</label><br>
            <input type="radio" name="rate" id="four" value="four"/>
            <label for="four">4</label><br>
            <input type="radio" name="rate" id="five" value="five"/>
            <label for="five">5</label><br>
        </div>
        <button>Send your message!</button>
    </form>
</body>
</html>
