<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table border ="Black">
        <caption>Food chain</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th  >
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>frooti</td>
                <td>10</td>
                <td>20</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>20</td>
                <td>20</td>
            </tr>
            <tr>
                <td>vadaa</td>
                <td>30</td>
                <td>20</td>
            </tr>
            <tr>
                <td>maaza</td>
                <td>20</td>
                <td>20</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>Total items</th>
                <th>Total Price</th>
                <th>Total Price</th>
            </tr>
            <tr>
                <td>4</td>
                <td>80</td>
                <td>20</td>
            </tr>
        </tfoot>
    </table>
    
</body>
</html>
