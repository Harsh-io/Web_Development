<!--CHECKBOX-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <input type="checkbox" name="age" id="age" checked/>
        <!--by befault checked chahiye (in the box than use "checked/")-->
        <label for="age">I am 18+</label>
        <button>Submit button </button>
        <!--if checkbox is ticked and submitted than in url its shown "age=on" else "age=off"-->
        <hr>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <div>
            <input type="radio" name="fruit" id="apple" value="apple"/>
            <label for="apple">Apple</label>
            <input type="radio" name="fruit" id="mango" value="mango"/>
            <label for="mango">mango</label>
            <input type="radio" name="fruit" id="orange" value="orange"/>
            <label for="orange">orange</label>
        <!--name = value {name=fruit and value from label
         if name same than only name should be same / if value is needed to pass than value needed to be added}-->
        </div>
        <br>
        <hr>
        <div>
            Choose your subjects:
            <input type="checkbox" id="math" name="sub" value="math"/>
            <label for="math">math</label>
            <input type="checkbox" id="science" name="sub" value="sci"/>
            <label for="science">science</label>
            <input type="checkbox" id="english" name="sub" value="eng"/>
            <label for="english">english</label>
        </div>
        <button>submit</button> 
        <hr> 
        <!--Checkbox: even after groupping multiple options can be selected -->

                <!-- student is selected from start then use -->
                <!--<option value="stu" selected >Student</option>-->
            </select>
        </div>
        <button>Submit</button>

         <!--these vol lvl are shown in url uusing name attribute-->
